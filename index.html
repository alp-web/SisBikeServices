<!DOCTYPE html>
<html>
<head>
  <title>Sis Bike Delivery</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

  <h1>🚴 Sis Delivery Service</h1>
  <h1>ሲስ የዴሊቨሪ አገልግሎት</h1>

  <!-- MAP -->
  <div id="map"></div>

  <!-- MAP CONTROLS -->
  <button onclick="useMyLocation()">Use My Location 📍</button>
  <button onclick="setPickupMode()">Select Pickup</button>
  <button onclick="setDropoffMode()">Select Dropoff</button>

  <div class="form">

    <input type="text" id="pickup" placeholder="Pickup Location">
    <input type="text" id="dropoff" placeholder="Drop-off Location">

    <input type="number" id="distance" placeholder="Distance (KM)" readonly>

    <input type="number" id="weight" placeholder="Weight (kg)" min="1">

    <input type="number" id="Tip" placeholder="Tip">

    <input type="text" id="Discount" placeholder="Promo Code">

    <p id="priceDisplay">Estimated Price: 0 Birr</p>

    <button onclick="requestDelivery()">Request Delivery</button>

  </div>

  <h2>Delivery Requests</h2>
  <ul id="requestsList"></ul>

</div>

<!-- GOOGLE MAPS -->
<script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyAdxzIx6p5vrkaMyQPEV5-NafiB162revs&callback=initMap" async defer></script>

<script src="app.js"></script>

</body>
</html>
