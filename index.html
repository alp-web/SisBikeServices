<!DOCTYPE html>
<html>
<head>
  <title>Sis Bike Delivery</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="container">

  <h1>🚴 Sis Bike Delivery Service</h1>

  <img src="your-image-url.jpg" alt="Bike Delivery" class="hero">

  <div class="form">
    <input type="text" id="pickup" placeholder="Pickup Location (موقع الاستلام)">
    <input type="text" id="dropoff" placeholder="Drop-off Location (موقع التسليم)">
    <button onclick="requestDelivery()">Request Delivery</button>
  </div>

  <h2> ደሊቨሪ ይዘዙ (Delivery Requests)</h2>
  <ul id="requestsList"></ul>

</div>


<script src="app.js"></script>
</body>
</html>
