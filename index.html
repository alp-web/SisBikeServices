<!DOCTYPE html>
<html>
<head>
  <title>Map Test</title>
  <style>
    #map {
      width: 100%;
      height: 400px;
      background: red;
    }
  </style>
</head>

<body>

<h2>Map Test</h2>
<div id="map"></div>

<script>
function initMap() {
  new google.maps.Map(document.getElementById("map"), {
    center: { lat: 9.03, lng: 38.74 },
    zoom: 12
  });
}
</script>

<script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyAdxzIx6p5vrkaMyQPEV5-NafiB162revs&callback=initMap" async defer></script>
</body>
</html>
