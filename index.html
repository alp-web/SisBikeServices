<!DOCTYPE html>
<html>
<head>
  <title>Sis Bike Delivery</title>
  <link rel="stylesheet" href="style.css">
</head>
  
<!--Map-->
  
  <div id="map"></div>

  <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyXXXXXXX&libraries=places"></script>
<script>
  let map;

  function initMap() {
    map = new google.maps.Map(document.getElementById("map"), {
      center: { lat: 9.03, lng: 38.74 }, // Addis Ababa (change if needed)
      zoom: 12,
    });
  }

  window.onload = initMap;
</script>


<body>

  <div class="container">

  <h1>🚴 Sis Delivery Service</h1>
  <h1> ሲስ የዴሊቨሪ አገልግሎት</h1>

  <div class="form">
    <input type="text" id="pickup" placeholder="Pickup Location (መነሻ ቦታ)">
    <input type="text" id="dropoff" placeholder="Drop-off Location (መድረሻ ቦታ)">
    <input type="number"  id="distance"  placeholder="Distance (KM) / ርቀት (ኪሜ)"  min="1"  step="1" /> 
    <p id="distanceInfo">Distance: Not calculated</p>
    <input type="number" id="weight" placeholder="Item Weight (የአቃው ክብደት ግምት) (kg)" min="1" step="1" oninput="this.value = this.value.replace(/[^0-9]/g, '')"/>
    <p id="priceDisplay">Estimated Price: 0 Birr</p>
    <input type="text" id="Tip" placeholder="Tip for Driver (ለሹፌር ቲፕ)">
    <input type="text" id="Discount" placeholder="Promo Code (የቅናሽ ኮድ)">
    <button onclick="requestDelivery()">Request Delivery</button>
  </div>

  <h2> ደሊቨሪ ይዘዙ (Delivery Requests)</h2>
  <ul id="requestsList"></ul>

</div>


<script src="app.js"></script>
</body>
</html>
